services:
  - type: web
    name: spreetail-expense-tracker-backend
    runtime: python
    rootDir: backend
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: "spreetail-expense-tracker.onrender.com,localhost"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://spreetail-expense-tracker.vercel.app,http://localhost:5173"
      - key: DEBUG
        value: "False"
